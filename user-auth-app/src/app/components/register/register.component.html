<div class="page-wrapper">
  <div class="card">
    <h2>Create Account</h2>
    <p class="subtitle">Sign up to get started</p>

    <div *ngIf="message" class="alert" [ngClass]="messageType">{{ message }}</div>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input id="name" type="text" [(ngModel)]="name" name="name" placeholder="John Doe" />
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input id="email" type="email" [(ngModel)]="email" name="email" placeholder="john@example.com" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" [(ngModel)]="password" name="password" placeholder="••••••••" />
      </div>
      <button type="submit" class="btn-primary">Register</button>
    </form>

    <p class="link-text">Already have an account? <a routerLink="/login">Login here</a></p>
  </div>
</div>
