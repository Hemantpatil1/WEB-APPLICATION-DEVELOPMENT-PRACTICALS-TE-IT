<div class="page-wrapper">
  <div class="card">
    <h2>Welcome Back</h2>
    <p class="subtitle">Sign in to your account</p>

    <div *ngIf="message" class="alert" [ngClass]="messageType">{{ message }}</div>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input id="email" type="email" [(ngModel)]="email" name="email" placeholder="john@example.com" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" [(ngModel)]="password" name="password" placeholder="••••••••" />
      </div>
      <button type="submit" class="btn-primary">Login</button>
    </form>

    <p class="link-text">Don't have an account? <a routerLink="/">Register here</a></p>
  </div>
</div>
